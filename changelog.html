<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMNI Brasil — Changelog</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --color-black: #050505;
    --color-dark: #0D0D0D;
    --color-dark-elevated: #1A1A1A;
    --color-dark-texture: #2D2D2D;
    --color-gold: #C8A84B;
    --color-gold-light: #E8C86A;
    --color-gold-deep: #9A7A2E;
    --color-cream: #F5F0E8;
    --color-cream-70: rgba(245, 240, 232, 0.70);
    --color-cream-50: rgba(245, 240, 232, 0.50);
    --color-teal: #2A9D8F;
    --color-gray: #6B6B6B;
    --font-display: 'Oswald', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  body {
    background: var(--color-black);
    color: var(--color-cream);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  /* ── PASSWORD GATE ── */
  #gate {
    position: fixed; inset: 0;
    background: var(--color-black);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    flex-direction: column; gap: 24px;
  }
  #gate.hidden { display: none; }
  #gate .logo { font-family: var(--font-display); font-size: 28px; letter-spacing: 6px; color: var(--color-gold); text-transform: uppercase; }
  #gate .sub { font-size: 12px; letter-spacing: 3px; color: var(--color-cream-50); text-transform: uppercase; }
  #gate input {
    background: var(--color-dark-elevated); border: 1px solid var(--color-dark-texture);
    color: var(--color-cream); padding: 14px 20px; border-radius: 8px;
    font-size: 16px; text-align: center; width: 280px; outline: none;
    font-family: var(--font-body);
  }
  #gate input:focus { border-color: var(--color-gold); }
  #gate .error { color: #e74c3c; font-size: 13px; display: none; }

  /* ── MAIN CONTENT ── */
  #app { display: none; }
  #app.visible { display: block; }

  header {
    padding: 40px 32px 24px;
    border-bottom: 1px solid rgba(200,168,75,0.15);
    position: sticky; top: 0; background: var(--color-black); z-index: 10;
  }
  header .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  header .brand { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: 5px; color: var(--color-gold); text-transform: uppercase; }
  header .page-title { font-size: 13px; letter-spacing: 2px; color: var(--color-cream-50); text-transform: uppercase; }

  /* ── STATS ── */
  .stats {
    display: flex; gap: 24px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .stat {
    background: var(--color-dark-elevated); border: 1px solid var(--color-dark-texture);
    border-radius: 8px; padding: 16px 20px; min-width: 140px;
  }
  .stat-value { font-family: var(--font-display); font-size: 28px; color: var(--color-gold); }
  .stat-label { font-size: 11px; letter-spacing: 2px; color: var(--color-cream-50); text-transform: uppercase; margin-top: 4px; }

  /* ── FILTERS ── */
  .filters {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  .filter-btn {
    background: var(--color-dark-elevated); border: 1px solid var(--color-dark-texture);
    color: var(--color-cream-70); padding: 8px 16px; border-radius: 50px;
    font-size: 13px; cursor: pointer; font-family: var(--font-body);
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--color-gold); color: var(--color-cream); }
  .filter-btn.active { background: rgba(200,168,75,0.15); border-color: var(--color-gold); color: var(--color-gold); }

  .search-input {
    background: var(--color-dark-elevated); border: 1px solid var(--color-dark-texture);
    color: var(--color-cream); padding: 8px 16px; border-radius: 50px;
    font-size: 13px; outline: none; width: 200px; font-family: var(--font-body);
    margin-left: auto;
  }
  .search-input:focus { border-color: var(--color-gold); }
  .search-input::placeholder { color: var(--color-gray); }

  /* ── TIMELINE ── */
  .timeline { padding: 32px; max-width: 960px; margin: 0 auto; }

  .day-group { margin-bottom: 40px; }
  .day-header {
    font-family: var(--font-display); font-size: 18px; letter-spacing: 2px;
    color: var(--color-gold); text-transform: uppercase; margin-bottom: 16px;
    padding-bottom: 8px; border-bottom: 1px solid rgba(200,168,75,0.15);
    display: flex; align-items: center; justify-content: space-between;
  }
  .day-count { font-family: var(--font-body); font-size: 12px; color: var(--color-cream-50); letter-spacing: 0; text-transform: none; }

  .commit-card {
    background: var(--color-dark); border: 1px solid var(--color-dark-texture);
    border-radius: 8px; padding: 16px 20px; margin-bottom: 8px;
    display: flex; align-items: flex-start; gap: 14px;
    padding-left: 58px;
    transition: border-color 0.2s;
  }
  .commit-card:hover { border-color: rgba(200,168,75,0.3); }

  /* ── GROUP CARD ── */
  .group-card {
    background: var(--color-dark); border: 1px solid var(--color-dark-texture);
    border-radius: 8px; margin-bottom: 8px; transition: border-color 0.2s;
  }
  .group-card:hover { border-color: rgba(200,168,75,0.3); }
  .group-header {
    padding: 16px 20px; display: flex; align-items: center; gap: 14px; cursor: pointer;
    user-select: none;
  }
  .group-toggle {
    width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center;
    background: var(--color-dark-elevated); border: 1px solid var(--color-dark-texture);
    color: var(--color-gold); font-size: 14px; font-weight: 700; flex-shrink: 0;
    font-family: var(--font-body); transition: all 0.2s;
  }
  .group-card.open .group-toggle { background: rgba(200,168,75,0.15); border-color: var(--color-gold); }
  .group-count {
    background: var(--color-dark-elevated); border: 1px solid var(--color-dark-texture);
    color: var(--color-cream-50); font-size: 11px; padding: 2px 8px; border-radius: 50px;
    margin-left: auto; font-weight: 500;
  }
  .group-children {
    display: none; padding: 0 20px 12px 58px;
  }
  .group-card.open .group-children { display: block; }
  .group-child {
    padding: 8px 12px; margin-bottom: 4px; border-radius: 6px;
    background: var(--color-dark-elevated); border: 1px solid rgba(45,45,45,0.5);
    font-size: 13px; color: var(--color-cream-70); display: flex; align-items: center; gap: 10px;
  }
  .group-child .commit-hash { font-family: monospace; font-size: 10px; color: var(--color-gray); }

  .commit-badge {
    padding: 4px 10px; border-radius: 50px; font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase; font-weight: 600;
    white-space: nowrap; min-width: 90px; text-align: center;
  }
  .badge-novo { background: rgba(42,157,143,0.2); color: #2A9D8F; border: 1px solid rgba(42,157,143,0.3); }
  .badge-correcao { background: rgba(231,76,60,0.15); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }
  .badge-manutencao { background: rgba(200,168,75,0.15); color: var(--color-gold); border: 1px solid rgba(200,168,75,0.3); }
  .badge-documentacao { background: rgba(52,152,219,0.15); color: #3498db; border: 1px solid rgba(52,152,219,0.3); }
  .badge-sincronizacao { background: rgba(107,107,107,0.2); color: var(--color-gray); border: 1px solid rgba(107,107,107,0.3); }
  .badge-refatoracao { background: rgba(155,89,182,0.15); color: #9b59b6; border: 1px solid rgba(155,89,182,0.3); }
  .badge-outro { background: rgba(107,107,107,0.15); color: var(--color-gray); border: 1px solid rgba(107,107,107,0.3); }

  .commit-body { flex: 1; }
  .commit-msg { font-size: 14px; color: var(--color-cream); line-height: 1.4; }
  .commit-scope { color: var(--color-gold-light); font-weight: 600; }
  .commit-meta { font-size: 12px; color: var(--color-cream-50); margin-top: 6px; display: flex; gap: 16px; }
  .commit-author { color: var(--color-gold); font-weight: 500; }
  .commit-hash { font-family: monospace; font-size: 11px; color: var(--color-gray); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--color-cream-50);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state p { font-size: 14px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    header { padding: 24px 16px 16px; }
    .timeline { padding: 16px; }
    .stats { gap: 8px; }
    .stat { min-width: 100px; padding: 12px 14px; }
    .stat-value { font-size: 22px; }
    .commit-card { flex-direction: column; gap: 8px; padding-left: 20px; }
    .commit-badge { align-self: flex-start; }
    .search-input { width: 100%; margin-left: 0; margin-top: 8px; }
    .filters { gap: 6px; }
  }

  /* ── TABS ── */
  .tabs { display: flex; gap: 0; margin-bottom: 20px; }
  .tab {
    padding: 10px 24px; font-size: 13px; font-weight: 600; cursor: pointer;
    color: var(--color-cream-50); border-bottom: 2px solid transparent;
    font-family: var(--font-body); background: none; border-top: none; border-left: none; border-right: none;
    transition: all 0.2s; letter-spacing: 1px; text-transform: uppercase;
  }
  .tab:hover { color: var(--color-cream); }
  .tab.active { color: var(--color-gold); border-bottom-color: var(--color-gold); }

  /* ── RECURSOS VIEW ── */
  #recursos-view { display: none; padding: 32px; max-width: 960px; margin: 0 auto; }
  #recursos-view.visible { display: block; }

  .cap-section-title {
    font-family: var(--font-display); font-size: 16px; letter-spacing: 3px;
    color: var(--color-gold); text-transform: uppercase; margin: 32px 0 16px;
    padding-bottom: 8px; border-bottom: 1px solid rgba(200,168,75,0.15);
  }
  .cap-section-title:first-child { margin-top: 0; }

  .cap-card {
    background: var(--color-dark); border: 1px solid var(--color-dark-texture);
    border-radius: 10px; padding: 24px; margin-bottom: 12px; transition: border-color 0.2s;
  }
  .cap-card:hover { border-color: rgba(200,168,75,0.3); }

  .cap-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
  .cap-id { font-family: monospace; font-size: 11px; color: var(--color-gold-deep); }
  .cap-name { font-size: 17px; font-weight: 700; color: var(--color-cream); margin-top: 2px; }
  .cap-desc { font-size: 14px; color: var(--color-cream-70); line-height: 1.5; margin-bottom: 14px; }

  .cap-status {
    padding: 4px 12px; border-radius: 50px; font-size: 11px;
    letter-spacing: 1px; text-transform: uppercase; font-weight: 600; white-space: nowrap;
  }
  .cap-status-ativo { background: rgba(39,174,96,0.15); color: #27ae60; border: 1px solid rgba(39,174,96,0.3); }
  .cap-status-em_teste, .cap-status-em_desenvolvimento, .cap-status-parcialmente_funcional, .cap-status-parcialmente_ativo {
    background: rgba(243,156,18,0.15); color: #f39c12; border: 1px solid rgba(243,156,18,0.3);
  }
  .cap-status-planejado { background: rgba(52,152,219,0.15); color: #3498db; border: 1px solid rgba(52,152,219,0.3); }
  .cap-status-inativo { background: rgba(107,107,107,0.15); color: var(--color-gray); border: 1px solid rgba(107,107,107,0.3); }

  .cap-abilities { margin-bottom: 14px; }
  .cap-abilities-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--color-cream-50); font-weight: 600; margin-bottom: 6px; }
  .cap-ability {
    font-size: 13px; color: var(--color-cream-70); padding: 4px 0 4px 16px;
    position: relative; line-height: 1.4;
  }
  .cap-ability::before { content: ''; position: absolute; left: 0; top: 11px; width: 6px; height: 6px; border-radius: 50%; background: var(--color-gold-deep); }

  .cap-tech { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .cap-tech-tag {
    font-size: 11px; padding: 3px 10px; border-radius: 50px;
    background: var(--color-dark-elevated); border: 1px solid var(--color-dark-texture);
    color: var(--color-cream-50); font-family: monospace;
  }

  .cap-meta { font-size: 12px; color: var(--color-cream-50); display: flex; gap: 16px; flex-wrap: wrap; }
  .cap-meta .responsavel { color: var(--color-gold); font-weight: 500; }
  .cap-note { font-size: 12px; color: #f39c12; margin-top: 8px; font-style: italic; }

  /* ── INFRA SECTION ── */
  .infra-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .infra-card {
    background: var(--color-dark); border: 1px solid var(--color-dark-texture);
    border-radius: 8px; padding: 16px;
  }
  .infra-name { font-size: 14px; font-weight: 600; color: var(--color-cream); }
  .infra-detail { font-size: 12px; color: var(--color-cream-50); margin-top: 4px; }
  .infra-status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot-ativo, .dot-operacional { background: #27ae60; }
  .dot-inativo { background: #e74c3c; }

  footer {
    text-align: center; padding: 40px 20px;
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(245,240,232,0.2); border-top: 1px solid rgba(200,168,75,0.08);
  }
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="gate">
  <div class="logo">OMNI BRASIL</div>
  <div class="sub">Changelog — Acesso Restrito</div>
  <input type="password" id="pwd" placeholder="Senha de acesso" onkeypress="if(event.key==='Enter')checkPwd()">
  <div class="error" id="err">Senha incorreta</div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="top">
      <div>
        <div class="brand">OMNI BRASIL</div>
        <div class="page-title">Changelog de Desenvolvimento</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:12px;color:var(--color-cream-50)">Atualizado em</div>
        <div id="updated-at" style="font-size:14px;color:var(--color-gold)"></div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-changelog" onclick="switchTab('changelog')">Timeline</button>
      <button class="tab" id="tab-recursos" onclick="switchTab('recursos')">Recursos</button>
      <button class="tab" id="tab-backlog" onclick="switchTab('backlog')">Backlog</button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="filters" id="filters"></div>
  </header>

  <div class="timeline" id="timeline"></div>
  <div id="recursos-view"></div>
  <div id="backlog-view" style="display:none;padding:32px;max-width:960px;margin:0 auto;"></div>

  <footer>OMNI Brasil // Painel Interno // Atualizado Automaticamente</footer>
</div>

<script>
// ═══════════════════════════════════════
// PASSWORD CHECK
// ═══════════════════════════════════════
const HASH = '6f6d6e69373737'; // omni777 in hex
function checkPwd() {
  const v = document.getElementById('pwd').value;
  const h = Array.from(v).map(c => c.charCodeAt(0).toString(16)).join('');
  if (h === HASH) {
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pwd').value = '';
  }
}

// RENDER ENGINE
// ═══════════════════════════════════════
let activeFilters = { author: 'todos', type: 'todos' };
let searchQuery = '';

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function getStatusLabel(status) {
  const map = {
    novo: 'Novo', correcao: 'Correcao', manutencao: 'Manutencao',
    documentacao: 'Docs', sincronizacao: 'Sync', refatoracao: 'Refatoracao', outro: 'Outro'
  };
  return map[status] || status;
}

function renderStats() {
  const filtered = getFilteredData();
  const authors = new Set(filtered.map(c => c.author));
  const feats = filtered.filter(c => c.type === 'feat').length;
  const fixes = filtered.filter(c => c.type === 'fix').length;
  const days = new Set(filtered.map(c => c.date));

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-value">${filtered.length}</div><div class="stat-label">Atualizacoes</div></div>
    <div class="stat"><div class="stat-value">${feats}</div><div class="stat-label">Novidades</div></div>
    <div class="stat"><div class="stat-value">${fixes}</div><div class="stat-label">Correcoes</div></div>
    <div class="stat"><div class="stat-value">${days.size}</div><div class="stat-label">Dias Ativos</div></div>
    <div class="stat"><div class="stat-value">${authors.size}</div><div class="stat-label">Contribuidores</div></div>
  `;
}

function renderFilters() {
  const authors = [...new Set(DATA.map(c => c.author))].sort();
  const types = [...new Set(DATA.map(c => c.status))].sort();

  let html = '';

  // Author filters
  html += `<button class="filter-btn ${activeFilters.author==='todos'?'active':''}" onclick="setFilter('author','todos')">Todos</button>`;
  authors.forEach(a => {
    const name = a.split(' ')[0];
    html += `<button class="filter-btn ${activeFilters.author===a?'active':''}" onclick="setFilter('author','${a}')">${name}</button>`;
  });

  html += `<span style="color:var(--color-dark-texture);margin:0 4px">|</span>`;

  // Type filters
  const typeLabels = {novo:'Novo',correcao:'Correcao',manutencao:'Manutencao',documentacao:'Docs',sincronizacao:'Sync'};
  Object.entries(typeLabels).forEach(([k,v]) => {
    html += `<button class="filter-btn ${activeFilters.type===k?'active':''}" onclick="setFilter('type','${k}')">${v}</button>`;
  });

  // Search
  html += `<input class="search-input" type="text" placeholder="Buscar..." oninput="searchQuery=this.value;render()" value="${searchQuery}">`;

  document.getElementById('filters').innerHTML = html;
}

function setFilter(key, value) {
  if (activeFilters[key] === value && value !== 'todos') {
    activeFilters[key] = 'todos';
  } else {
    activeFilters[key] = value;
  }
  render();
}

function getFilteredData() {
  return DATA.filter(c => {
    if (activeFilters.author !== 'todos' && c.author !== activeFilters.author) return false;
    if (activeFilters.type !== 'todos' && c.status !== activeFilters.type) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return c.message.toLowerCase().includes(q) || (c.friendly||'').toLowerCase().includes(q) || c.scope.toLowerCase().includes(q) || c.author.toLowerCase().includes(q);
    }
    return true;
  });
}

let openGroups = {};

function toggleGroup(id) {
  openGroups[id] = !openGroups[id];
  const el = document.getElementById(id);
  if (el) {
    el.classList.toggle('open', openGroups[id]);
    const toggle = el.querySelector('.group-toggle');
    if (toggle) toggle.textContent = openGroups[id] ? '−' : '+';
  }
}

function renderTimeline() {
  const filtered = getFilteredData();

  if (filtered.length === 0) {
    document.getElementById('timeline').innerHTML = `
      <div class="empty-state">
        <div class="icon">O</div>
        <p>Nenhuma atualizacao encontrada com esses filtros.</p>
      </div>`;
    return;
  }

  // Group by date
  const dayGroups = {};
  filtered.forEach(c => {
    if (!dayGroups[c.date]) dayGroups[c.date] = [];
    dayGroups[c.date].push(c);
  });

  let html = '';
  Object.keys(dayGroups).sort().reverse().forEach(date => {
    const commits = dayGroups[date];

    // Sub-group by: status + scope + author
    const subGroups = {};
    commits.forEach(c => {
      const key = `${c.status}|${c.scope}|${c.author}`;
      if (!subGroups[key]) subGroups[key] = [];
      subGroups[key].push(c);
    });

    // Count visible cards (groups count as 1)
    const cardCount = Object.keys(subGroups).length;

    html += `<div class="day-group">`;
    html += `<div class="day-header">${formatDate(date)} <span class="day-count">${commits.length} atualizacao${commits.length>1?'es':''}</span></div>`;

    Object.entries(subGroups).forEach(([key, items]) => {
      if (items.length === 1) {
        // Single commit — render normally with friendly message
        const c = items[0];
        const scopeHtml = c.scope ? `<span class="commit-scope">[${c.scope}]</span> ` : '';
        html += `
          <div class="commit-card">
            <span class="commit-badge badge-${c.status}">${getStatusLabel(c.status)}</span>
            <div class="commit-body">
              <div class="commit-msg">${scopeHtml}${c.friendly || c.message}</div>
              <div class="commit-meta">
                <span class="commit-author">${c.author}</span>
                <span class="commit-hash">${c.hash}</span>
              </div>
            </div>
          </div>`;
      } else {
        // Multiple commits — render as collapsible group
        const groupId = `g-${date}-${key.replace(/[^a-zA-Z0-9]/g,'-')}`;
        const c = items[0];
        const scopeLabel = c.scope ? `[${c.scope}] ` : '';
        const isOpen = openGroups[groupId] || false;

        // Build a friendly group summary from first item's context
        const scopeDesc = c.scope ? c.scope.charAt(0).toUpperCase() + c.scope.slice(1) : 'Geral';
        const groupSummary = `${items.length} atualizacoes em ${scopeDesc}`;

        html += `
          <div class="group-card ${isOpen ? 'open' : ''}" id="${groupId}">
            <div class="group-header" onclick="toggleGroup('${groupId}')">
              <span class="group-toggle">${isOpen ? '−' : '+'}</span>
              <span class="commit-badge badge-${c.status}">${getStatusLabel(c.status)}</span>
              <div class="commit-body" style="flex:1">
                <div class="commit-msg"><span class="commit-scope">${scopeLabel}</span>${groupSummary}</div>
                <div class="commit-meta">
                  <span class="commit-author">${c.author}</span>
                </div>
              </div>
              <span class="group-count">${items.length}</span>
            </div>
            <div class="group-children">`;

        items.forEach(ci => {
          const techLine = (ci.friendly && ci.friendly !== ci.message) ? `<div style="font-size:11px;color:var(--color-gray);margin-top:3px;font-family:monospace">${ci.message}</div>` : '';
          html += `
              <div class="group-child">
                <div style="flex:1">${ci.friendly || ci.message}${techLine}</div>
                <span class="commit-hash">${ci.hash}</span>
              </div>`;
        });

        html += `
            </div>
          </div>`;
      }
    });

    html += `</div>`;
  });

  document.getElementById('timeline').innerHTML = html;
}

function render() {
  renderStats();
  renderFilters();
  renderTimeline();
}

let currentTab = 'changelog';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-changelog').classList.toggle('active', tab === 'changelog');
  document.getElementById('tab-recursos').classList.toggle('active', tab === 'recursos');
  document.getElementById('tab-backlog').classList.toggle('active', tab === 'backlog');
  document.getElementById('timeline').style.display = tab === 'changelog' ? 'block' : 'none';
  document.getElementById('recursos-view').classList.toggle('visible', tab === 'recursos');
  document.getElementById('backlog-view').style.display = tab === 'backlog' ? 'block' : 'none';
  document.getElementById('stats').style.display = tab === 'changelog' ? 'flex' : 'none';
  document.getElementById('filters').style.display = tab === 'changelog' ? 'flex' : 'none';
  if (tab === 'recursos') renderRecursos();
  if (tab === 'backlog') renderBacklog();
}

  {nome:"n8n", detalhe:"Orquestrador de workflows e automacoes (VPS)", status:"ativo"},
  {nome:"Pipedrive", detalhe:"CRM principal de vendas", status:"ativo"},
  {nome:"ActiveCampaign", detalhe:"Automacao de marketing e email", status:"ativo"},
  {nome:"Hostinger VPS", detalhe:"Ubuntu 24 | 8GB RAM | 2 vCPU | 76.13.169.211", status:"operacional"},
  {nome:"Tailscale VPN", detalhe:"Acesso seguro ao servidor", status:"ativo"},
  {nome:"GitHub Pages", detalhe:"Hospedagem de apresentacoes e paineis", status:"ativo"},
  {nome:"PostgreSQL 15", detalhe:"Banco de dados relacional (Docker, porta 5432)", status:"ativo"},
  {nome:"Redis 7", detalhe:"Cache e sessoes (Docker, porta 6379)", status:"ativo"},
  {nome:"rclone v1.73.2", detalhe:"Sync Google Drive (gdrive:) + OneDrive (onedrive:) — VPS", status:"ativo"}
];

// ═══════════════════════════════════════
// RENDER RECURSOS
// ═══════════════════════════════════════
function getStatusClass(s) {
  if (s.includes('ativo') || s === 'ativo') return 'ativo';
  if (s.includes('teste') || s.includes('desenvolvimento') || s.includes('parcial') || s.includes('funcional')) return 'em_teste';
  if (s === 'planejado') return 'planejado';
  return 'inativo';
}

function renderRecursos() {
  const ativos = CAPABILITIES.filter(c => c.status === 'ativo' || c.status.includes('parcial'));
  const emDev = CAPABILITIES.filter(c => c.status.includes('desenvolvimento') || c.status.includes('teste'));
  const planejados = CAPABILITIES.filter(c => c.status === 'planejado');

  let html = `<div class="stats" style="display:flex;margin-bottom:24px">
    <div class="stat"><div class="stat-value">${CAPABILITIES.length}</div><div class="stat-label">Recursos</div></div>
    <div class="stat"><div class="stat-value">${ativos.length}</div><div class="stat-label">Ativos</div></div>
    <div class="stat"><div class="stat-value">${emDev.length}</div><div class="stat-label">Em Dev</div></div>
    <div class="stat"><div class="stat-value">${planejados.length}</div><div class="stat-label">Planejados</div></div>
    <div class="stat"><div class="stat-value">${INFRA.length}</div><div class="stat-label">Infra</div></div>
  </div>`;

  // Ativos
  if (ativos.length) {
    html += `<div class="cap-section-title">Ativos (${ativos.length})</div>`;
    ativos.forEach(c => { html += renderCapCard(c); });
  }

  // Em desenvolvimento
  if (emDev.length) {
    html += `<div class="cap-section-title">Em Desenvolvimento (${emDev.length})</div>`;
    emDev.forEach(c => { html += renderCapCard(c); });
  }

  // Planejados
  if (planejados.length) {
    html += `<div class="cap-section-title">Planejados (${planejados.length})</div>`;
    planejados.forEach(c => { html += renderCapCard(c); });
  }

  // Infraestrutura
  html += `<div class="cap-section-title">Infraestrutura Base (${INFRA.length})</div>`;
  html += `<div class="infra-grid">`;
  INFRA.forEach(i => {
    const dotClass = i.status === 'ativo' || i.status === 'operacional' ? 'dot-ativo' : 'dot-inativo';
    html += `
      <div class="infra-card">
        <div class="infra-name"><span class="infra-status-dot ${dotClass}"></span>${i.nome}</div>
        <div class="infra-detail">${i.detalhe}</div>
      </div>`;
  });
  html += `</div>`;

  document.getElementById('recursos-view').innerHTML = html;
}

let openCaps = {};

function toggleCap(id) {
  openCaps[id] = !openCaps[id];
  const el = document.getElementById('cap-'+id);
  if (el) {
    const toggle = el.querySelector('.group-toggle');
    const details = el.querySelector('.cap-details');
    if (toggle) toggle.textContent = openCaps[id] ? '−' : '+';
    if (details) details.style.display = openCaps[id] ? 'block' : 'none';
  }
}

function renderCapCard(c) {
  const statusClass = getStatusClass(c.status);
  const abilities = c.habilidades.map(h => `<div class="cap-ability">${h}</div>`).join('');
  const apis = c.apis.map(a => `<span class="cap-tech-tag">${a}</span>`).join('');
  const nota = c.nota ? `<div class="cap-note">${c.nota}</div>` : '';
  const isOpen = openCaps[c.id] || false;
  const ver = c.versao !== '0.0' ? `<span style="font-size:11px;color:var(--color-gray);margin-left:4px">v${c.versao}</span>` : '';

  // Dependencias
  let depsHtml = '';
  if (c.depende.length || c.dependentes.length) {
    const depLabels = c.depende.map(d => { const found = CAPABILITIES.find(x=>x.id===d); return found ? found.nome : d; });
    const depteLabels = c.dependentes.map(d => { const found = CAPABILITIES.find(x=>x.id===d); return found ? found.nome : d; });
    depsHtml = '<div style="margin-top:12px">';
    if (depLabels.length) depsHtml += `<div style="font-size:12px;color:var(--color-cream-50)">Depende de: <span style="color:#e74c3c">${depLabels.join(', ')}</span></div>`;
    if (depteLabels.length) depsHtml += `<div style="font-size:12px;color:var(--color-cream-50)">Usado por: <span style="color:var(--color-teal)">${depteLabels.join(', ')}</span></div>`;
    depsHtml += '</div>';
  }

  // Link
  const linkHtml = c.link && c.link !== '—' ? `<div style="font-size:12px;color:var(--color-cream-50);margin-top:8px">Acesso: <span style="color:var(--color-gold-light)">${c.link}</span></div>` : '';

  return `
    <div class="cap-card" id="cap-${c.id}" style="padding:0">
      <div class="group-header" onclick="toggleCap('${c.id}')" style="padding:20px 24px;display:flex;align-items:center;gap:14px;cursor:pointer;user-select:none">
        <span class="group-toggle" style="flex-shrink:0">${isOpen ? '−' : '+'}</span>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span class="cap-id">${c.id}</span>
            <span class="cap-name" style="font-size:15px;margin:0">${c.nome}</span>${ver}
          </div>
          <div class="cap-meta" style="margin-top:4px">
            <span class="responsavel">${c.responsavel}</span>
            <span>Inicio: ${c.inicio}</span>
            <span>Atualizado: ${c.atualizado}</span>
          </div>
        </div>
        <span class="cap-status cap-status-${statusClass}">${c.statusLabel}</span>
      </div>
      <div style="display:${isOpen?'block':'none'};padding:0 24px 20px 58px" class="cap-details">
        <div class="cap-desc">${c.descricao}</div>
        <div class="cap-abilities">
          <div class="cap-abilities-title">Habilidades</div>
          ${abilities}
        </div>
        <div class="cap-abilities-title" style="margin-top:12px">APIs e Sistemas</div>
        <div class="cap-tech" style="margin-top:6px">${apis}</div>
        <div style="margin-top:12px;font-size:12px;color:var(--color-cream-50);line-height:1.8">
          <div>Criado por: <span class="responsavel">${c.criador}</span></div>
          <div>Mantido por: <span class="responsavel">${c.responsavel}</span></div>
        </div>
        ${linkHtml}
        ${depsHtml}
        ${nota}
      </div>
    </div>`;
}

// Init
document.getElementById('updated-at').textContent = new Date().toLocaleDateString('pt-BR');
render();
</script>
</body>
</html>
