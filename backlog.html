<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMNI Brasil — Backlog de Ideias</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --color-black: #050505;
    --color-dark: #0D0D0D;
    --color-dark-elevated: #1A1A1A;
    --color-dark-texture: #2D2D2D;
    --color-gold: #C8A84B;
    --color-gold-light: #E8C86A;
    --color-gold-deep: #9A7A2E;
    --color-cream: #F5F0E8;
    --color-cream-70: rgba(245, 240, 232, 0.70);
    --color-cream-50: rgba(245, 240, 232, 0.50);
    --color-teal: #2A9D8F;
    --color-gray: #6B6B6B;
    --font-display: 'Oswald', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  body {
    background: var(--color-black);
    color: var(--color-cream);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  /* ── PASSWORD GATE ── */
  #gate {
    position: fixed; inset: 0;
    background: var(--color-black);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    flex-direction: column; gap: 24px;
  }
  #gate.hidden { display: none; }
  #gate .logo { font-family: var(--font-display); font-size: 28px; letter-spacing: 6px; color: var(--color-gold); text-transform: uppercase; }
  #gate .sub { font-size: 12px; letter-spacing: 3px; color: var(--color-cream-50); text-transform: uppercase; }
  #gate input {
    background: var(--color-dark-elevated); border: 1px solid var(--color-dark-texture);
    color: var(--color-cream); padding: 14px 20px; border-radius: 8px;
    font-size: 16px; text-align: center; width: 280px; outline: none;
    font-family: var(--font-body);
  }
  #gate input:focus { border-color: var(--color-gold); }
  #gate .error { color: #e74c3c; font-size: 13px; display: none; }

  /* ── MAIN CONTENT ── */
  #app { display: none; }
  #app.visible { display: block; }

  header {
    padding: 40px 32px 24px;
    border-bottom: 1px solid rgba(200,168,75,0.15);
    position: sticky; top: 0; background: var(--color-black); z-index: 10;
  }
  header .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  header .brand { font-family: var(--font-display); font-size: 22px; letter-spacing: 5px; color: var(--color-gold); text-transform: uppercase; }
  header .page-title { font-size: 13px; letter-spacing: 2px; color: var(--color-cream-50); text-transform: uppercase; }
  header .gustaff-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(37,211,102,0.1); border: 1px solid rgba(37,211,102,0.3);
    color: #25D366; padding: 6px 14px; border-radius: 50px; font-size: 12px; font-weight: 500;
  }

  /* ── STATS ── */
  .stats { display: flex; gap: 24px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat {
    background: var(--color-dark-elevated); border: 1px solid var(--color-dark-texture);
    border-radius: 8px; padding: 16px 20px; min-width: 120px;
  }
  .stat-value { font-family: var(--font-display); font-size: 28px; color: var(--color-gold); }
  .stat-label { font-size: 11px; letter-spacing: 2px; color: var(--color-cream-50); text-transform: uppercase; margin-top: 4px; }

  /* ── FILTERS ── */
  .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .filter-btn {
    background: var(--color-dark-elevated); border: 1px solid var(--color-dark-texture);
    color: var(--color-cream-70); padding: 8px 16px; border-radius: 50px;
    font-size: 13px; cursor: pointer; font-family: var(--font-body); transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--color-gold); color: var(--color-cream); }
  .filter-btn.active { background: rgba(200,168,75,0.15); border-color: var(--color-gold); color: var(--color-gold); }

  .search-input {
    background: var(--color-dark-elevated); border: 1px solid var(--color-dark-texture);
    color: var(--color-cream); padding: 8px 16px; border-radius: 50px;
    font-size: 13px; outline: none; width: 200px; font-family: var(--font-body); margin-left: auto;
  }
  .search-input:focus { border-color: var(--color-gold); }
  .search-input::placeholder { color: var(--color-gray); }

  /* ── BACKLOG CARDS ── */
  .backlog-list { padding: 32px; max-width: 960px; margin: 0 auto; }

  .idea-card {
    background: var(--color-dark); border: 1px solid var(--color-dark-texture);
    border-radius: 10px; padding: 24px; margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .idea-card:hover { border-color: rgba(200,168,75,0.3); }

  .idea-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
  .idea-id { font-family: monospace; font-size: 12px; color: var(--color-gold-deep); font-weight: 600; }
  .idea-title { font-size: 16px; font-weight: 600; color: var(--color-cream); margin-top: 4px; line-height: 1.3; }

  .idea-status {
    padding: 4px 12px; border-radius: 50px; font-size: 11px;
    letter-spacing: 1px; text-transform: uppercase; font-weight: 600; white-space: nowrap;
  }
  .status-idea { background: rgba(52,152,219,0.15); color: #3498db; border: 1px solid rgba(52,152,219,0.3); }
  .status-refinando { background: rgba(243,156,18,0.15); color: #f39c12; border: 1px solid rgba(243,156,18,0.3); }
  .status-pronto { background: rgba(200,168,75,0.15); color: var(--color-gold); border: 1px solid rgba(200,168,75,0.3); }
  .status-em_desenvolvimento { background: rgba(42,157,143,0.2); color: #2A9D8F; border: 1px solid rgba(42,157,143,0.3); }
  .status-feito { background: rgba(39,174,96,0.15); color: #27ae60; border: 1px solid rgba(39,174,96,0.3); }
  .status-descartado { background: rgba(107,107,107,0.15); color: var(--color-gray); border: 1px solid rgba(107,107,107,0.3); }

  .idea-desc { font-size: 14px; color: var(--color-cream-70); line-height: 1.5; margin-bottom: 12px; }

  .idea-meta { display: flex; gap: 20px; flex-wrap: wrap; font-size: 12px; color: var(--color-cream-50); }
  .idea-meta .author { color: var(--color-gold); font-weight: 500; }
  .idea-meta .category {
    background: var(--color-dark-elevated); padding: 2px 10px; border-radius: 50px;
    border: 1px solid var(--color-dark-texture); font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  }
  .idea-meta .priority-alta { color: #e74c3c; }
  .idea-meta .priority-media { color: #f39c12; }
  .idea-meta .priority-baixa { color: var(--color-cream-50); }

  .idea-complementos {
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--color-dark-texture);
  }
  .complemento {
    background: var(--color-dark-elevated); border-radius: 6px; padding: 10px 14px;
    margin-top: 8px; font-size: 13px; color: var(--color-cream-70);
  }
  .complemento .comp-meta { font-size: 11px; color: var(--color-cream-50); margin-top: 4px; }

  .idea-related {
    margin-top: 8px; font-size: 12px; color: var(--color-cream-50);
  }
  .idea-related a { color: var(--color-gold); text-decoration: none; }
  .idea-related a:hover { text-decoration: underline; }

  /* ── KANBAN VIEW ── */
  .view-toggle { display: flex; gap: 8px; margin-bottom: 20px; }
  .kanban { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; padding: 32px; max-width: 1200px; margin: 0 auto; }
  .kanban-col { background: var(--color-dark); border-radius: 10px; padding: 16px; }
  .kanban-col-title {
    font-family: var(--font-display); font-size: 14px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--color-gold); margin-bottom: 12px;
    padding-bottom: 8px; border-bottom: 1px solid rgba(200,168,75,0.15);
  }
  .kanban-card {
    background: var(--color-dark-elevated); border: 1px solid var(--color-dark-texture);
    border-radius: 6px; padding: 12px; margin-bottom: 8px; font-size: 13px;
  }
  .kanban-card .k-id { font-family: monospace; font-size: 10px; color: var(--color-gold-deep); }
  .kanban-card .k-title { margin-top: 4px; color: var(--color-cream); font-weight: 500; }
  .kanban-card .k-author { font-size: 11px; color: var(--color-cream-50); margin-top: 6px; }

  .kanban.hidden, .backlog-list.hidden { display: none; }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    header { padding: 24px 16px 16px; }
    .backlog-list, .kanban { padding: 16px; }
    .stats { gap: 8px; }
    .stat { min-width: 90px; padding: 12px; }
    .stat-value { font-size: 22px; }
    .idea-header { flex-direction: column; }
    .search-input { width: 100%; margin-left: 0; margin-top: 8px; }
    .kanban { grid-template-columns: 1fr; }
  }

  footer {
    text-align: center; padding: 40px 20px;
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(245,240,232,0.2); border-top: 1px solid rgba(200,168,75,0.08);
  }
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="gate">
  <div class="logo">OMNI BRASIL</div>
  <div class="sub">Backlog de Ideias — Acesso Restrito</div>
  <input type="password" id="pwd" placeholder="Senha de acesso" onkeypress="if(event.key==='Enter')checkPwd()">
  <div class="error" id="err">Senha incorreta</div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="top">
      <div>
        <div class="brand">OMNI BRASIL</div>
        <div class="page-title">Backlog de Ideias</div>
      </div>
      <div style="text-align:right">
        <span class="gustaff-badge">Gustaff conectado</span>
        <div style="font-size:11px;color:var(--color-cream-50);margin-top:6px">Mande ideias pelo WhatsApp</div>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="filters">
      <div class="view-toggle">
        <button class="filter-btn active" id="btn-list" onclick="setView('list')">Lista</button>
        <button class="filter-btn" id="btn-kanban" onclick="setView('kanban')">Kanban</button>
      </div>
      <span style="color:var(--color-dark-texture);margin:0 4px">|</span>
      <div id="filter-buttons"></div>
      <input class="search-input" type="text" placeholder="Buscar ideia..." oninput="searchQuery=this.value;render()">
    </div>
  </header>

  <div class="backlog-list" id="list-view"></div>
  <div class="kanban hidden" id="kanban-view"></div>

  <footer>OMNI Brasil // Backlog Interno // Ideias via Gustaff (WhatsApp)</footer>
</div>

<script>
// ═══════════════════════════════════════
// PASSWORD CHECK
// ═══════════════════════════════════════
const HASH = '6f6d6e69373737';
function checkPwd() {
  const v = document.getElementById('pwd').value;
  const h = Array.from(v).map(c => c.charCodeAt(0).toString(16)).join('');
  if (h === HASH) {
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pwd').value = '';
  }
}

// ═══════════════════════════════════════
// BACKLOG DATA
// ═══════════════════════════════════════
const BACKLOG = [
  {
    id: "OMNI-001",
    titulo: "Changelog automatico da empresa",
    descricao: "HTML protegido com senha mostrando evolucao do que foi iniciado, desenvolvido e finalizado. Versionado por data e autor. Atualiza automaticamente a partir do git log.",
    autor: "Michael Arruda",
    data_criacao: "2026-03-29",
    status: "em_desenvolvimento",
    prioridade: "alta",
    categoria: "gestao",
    complementos: [],
    relacionadas: ["OMNI-002"]
  },
  {
    id: "OMNI-002",
    titulo: "Backlog via WhatsApp (Gustaff)",
    descricao: "Sistema onde Michael, Rafa e Julia mandam ideia pro Gustaff no WhatsApp, e ele adiciona no backlog automaticamente. IA entende se e ideia nova ou complemento de existente. Responde com confirmacao e contexto.",
    autor: "Michael Arruda",
    data_criacao: "2026-03-29",
    status: "em_desenvolvimento",
    prioridade: "alta",
    categoria: "gestao",
    complementos: [],
    relacionadas: ["OMNI-001"]
  },
  {
    id: "OMNI-003",
    titulo: "SDR com IA conectado ao CRM",
    descricao: "Corrigir SDR automatizado que qualifica leads e agenda via WhatsApp. Ja em teste mas com problemas de funcionamento.",
    autor: "Michael Arruda",
    data_criacao: "2026-03-29",
    status: "em_desenvolvimento",
    prioridade: "alta",
    categoria: "vendas",
    complementos: [],
    relacionadas: []
  },
  {
    id: "OMNI-004",
    titulo: "Transcricao de calls com insights",
    descricao: "Implementar transcricao automatica de chamadas de vendas com extracao de insights acionaveis.",
    autor: "Michael Arruda",
    data_criacao: "2026-03-29",
    status: "idea",
    prioridade: "alta",
    categoria: "vendas",
    complementos: [],
    relacionadas: ["OMNI-003"]
  },
  {
    id: "OMNI-005",
    titulo: "Automatizar criacao de funis",
    descricao: "Paginas, copy e automacoes de funil criadas com IA. Reduzir tempo de criacao em 50%+.",
    autor: "Michael Arruda",
    data_criacao: "2026-03-29",
    status: "idea",
    prioridade: "media",
    categoria: "marketing",
    complementos: [],
    relacionadas: []
  },
  {
    id: "OMNI-006",
    titulo: "Sistema de gestao de mentoria automatizado",
    descricao: "Michel desenvolvendo com Vibe Coding. Gestao de turma automatizada.",
    autor: "Michael Arruda",
    data_criacao: "2026-03-29",
    status: "em_desenvolvimento",
    prioridade: "media",
    categoria: "produto",
    complementos: [],
    relacionadas: []
  }
];

// ═══════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════
let activeFilter = 'todos';
let searchQuery = '';
let currentView = 'list';

const statusLabels = {
  idea: 'Ideia', refinando: 'Refinando', pronto: 'Pronto',
  em_desenvolvimento: 'Em Dev', feito: 'Feito', descartado: 'Descartado'
};
const statusOrder = ['idea','refinando','pronto','em_desenvolvimento','feito','descartado'];
const prioLabels = { alta: 'Alta', media: 'Media', baixa: 'Baixa' };

function getFiltered() {
  return BACKLOG.filter(item => {
    if (activeFilter !== 'todos') {
      if (['alta','media','baixa'].includes(activeFilter)) {
        if (item.prioridade !== activeFilter) return false;
      } else if (statusLabels[activeFilter]) {
        if (item.status !== activeFilter) return false;
      } else if (item.autor !== activeFilter) return false;
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return item.titulo.toLowerCase().includes(q) || item.descricao.toLowerCase().includes(q) || item.autor.toLowerCase().includes(q) || item.id.toLowerCase().includes(q);
    }
    return true;
  });
}

function renderStats() {
  const total = BACKLOG.length;
  const emDev = BACKLOG.filter(i => i.status === 'em_desenvolvimento').length;
  const ideas = BACKLOG.filter(i => i.status === 'idea').length;
  const alta = BACKLOG.filter(i => i.prioridade === 'alta').length;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-value">${total}</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-value">${emDev}</div><div class="stat-label">Em Dev</div></div>
    <div class="stat"><div class="stat-value">${ideas}</div><div class="stat-label">Ideias</div></div>
    <div class="stat"><div class="stat-value">${alta}</div><div class="stat-label">Alta Prioridade</div></div>
  `;
}

function renderFilters() {
  let html = '';
  html += `<button class="filter-btn ${activeFilter==='todos'?'active':''}" onclick="setFilter('todos')">Todos</button>`;
  html += `<button class="filter-btn ${activeFilter==='alta'?'active':''}" onclick="setFilter('alta')">Alta</button>`;
  html += `<button class="filter-btn ${activeFilter==='idea'?'active':''}" onclick="setFilter('idea')">Ideias</button>`;
  html += `<button class="filter-btn ${activeFilter==='em_desenvolvimento'?'active':''}" onclick="setFilter('em_desenvolvimento')">Em Dev</button>`;
  document.getElementById('filter-buttons').innerHTML = html;
}

function setFilter(f) {
  activeFilter = activeFilter === f ? 'todos' : f;
  render();
}

function setView(v) {
  currentView = v;
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  document.getElementById('btn-kanban').classList.toggle('active', v === 'kanban');
  document.getElementById('list-view').classList.toggle('hidden', v !== 'list');
  document.getElementById('kanban-view').classList.toggle('hidden', v !== 'kanban');
  render();
}

function renderList() {
  const filtered = getFiltered();
  if (!filtered.length) {
    document.getElementById('list-view').innerHTML = '<div style="text-align:center;padding:60px;color:var(--color-cream-50)">Nenhuma ideia encontrada.</div>';
    return;
  }

  let html = '';
  filtered.forEach(item => {
    const relHtml = item.relacionadas.length
      ? `<div class="idea-related">Relacionada: ${item.relacionadas.map(r => `<a href="#" onclick="searchQuery='${r}';document.querySelector('.search-input').value='${r}';render();return false">${r}</a>`).join(', ')}</div>`
      : '';

    const compHtml = item.complementos.length
      ? `<div class="idea-complementos"><div style="font-size:12px;color:var(--color-cream-50);font-weight:600;text-transform:uppercase;letter-spacing:1px">Complementos</div>${item.complementos.map(c => `<div class="complemento">${c.texto}<div class="comp-meta">${c.autor} — ${c.data}</div></div>`).join('')}</div>`
      : '';

    html += `
      <div class="idea-card">
        <div class="idea-header">
          <div>
            <div class="idea-id">${item.id}</div>
            <div class="idea-title">${item.titulo}</div>
          </div>
          <span class="idea-status status-${item.status}">${statusLabels[item.status]}</span>
        </div>
        <div class="idea-desc">${item.descricao}</div>
        <div class="idea-meta">
          <span class="author">${item.autor}</span>
          <span>${item.data_criacao}</span>
          <span class="priority-${item.prioridade}">${prioLabels[item.prioridade]}</span>
          <span class="category">${item.categoria}</span>
        </div>
        ${relHtml}
        ${compHtml}
      </div>`;
  });

  document.getElementById('list-view').innerHTML = html;
}

function renderKanban() {
  const filtered = getFiltered();
  const columns = {};
  statusOrder.forEach(s => { columns[s] = []; });
  filtered.forEach(item => {
    if (columns[item.status]) columns[item.status].push(item);
  });

  let html = '';
  statusOrder.forEach(status => {
    const items = columns[status];
    if (!items.length && !['idea','em_desenvolvimento','feito'].includes(status)) return;
    html += `<div class="kanban-col">
      <div class="kanban-col-title">${statusLabels[status]} (${items.length})</div>`;
    items.forEach(item => {
      html += `
        <div class="kanban-card">
          <div class="k-id">${item.id}</div>
          <div class="k-title">${item.titulo}</div>
          <div class="k-author">${item.autor.split(' ')[0]} — ${prioLabels[item.prioridade]}</div>
        </div>`;
    });
    html += `</div>`;
  });

  document.getElementById('kanban-view').innerHTML = html;
}

function render() {
  renderStats();
  renderFilters();
  renderList();
  renderKanban();
}

render();
</script>
</body>
</html>
